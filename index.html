<script>
    // 화면에 표시되는 한글의 모든 'ㅇ'을 'ㅁ'으로 변환
    // 예: 청첩장 → 첨첩잠, 서진성 → 서진섬
    (function () {
        const HANGUL_BASE = 0xAC00;
        const HANGUL_END = 0xD7A3;
        const MEDIAL_COUNT = 21;
        const FINAL_COUNT = 28;
        const SYLLABLES_PER_INITIAL = MEDIAL_COUNT * FINAL_COUNT;

        // 초성 ㅇ → ㅁ
        const INITIAL_IEUNG = 11;
        const INITIAL_MIEUM = 6;

        // 종성 ㅇ → ㅁ
        const FINAL_IEUNG = 21;
        const FINAL_MIEUM = 16;

        function replaceIeungWithMieum(text) {
            return Array.from(text).map((char) => {
                const code = char.codePointAt(0);

                // 완성형 한글 음절 변환
                if (code >= HANGUL_BASE && code <= HANGUL_END) {
                    const syllableIndex = code - HANGUL_BASE;

                    let initialIndex = Math.floor(
                        syllableIndex / SYLLABLES_PER_INITIAL
                    );

                    const medialIndex = Math.floor(
                        (syllableIndex % SYLLABLES_PER_INITIAL)
                        / FINAL_COUNT
                    );

                    let finalIndex = syllableIndex % FINAL_COUNT;

                    if (initialIndex === INITIAL_IEUNG) {
                        initialIndex = INITIAL_MIEUM;
                    }

                    if (finalIndex === FINAL_IEUNG) {
                        finalIndex = FINAL_MIEUM;
                    }

                    const changedCode =
                        HANGUL_BASE
                        + initialIndex * SYLLABLES_PER_INITIAL
                        + medialIndex * FINAL_COUNT
                        + finalIndex;

                    return String.fromCodePoint(changedCode);
                }

                // 단독 자모 변환
                if (char === "ㅇ") return "ㅁ";
                if (char === "ᄋ") return "ᄆ";
                if (char === "ᆼ") return "ᆷ";

                return char;
            }).join("");
        }

        function convertVisibleText(root = document.body) {
            if (!root) return;

            const walker = document.createTreeWalker(
                root,
                NodeFilter.SHOW_TEXT,
                {
                    acceptNode(node) {
                        const parentTag = node.parentElement?.tagName;

                        // JavaScript와 CSS 코드는 변환하지 않음
                        if (
                            ["SCRIPT", "STYLE", "NOSCRIPT"]
                                .includes(parentTag)
                        ) {
                            return NodeFilter.FILTER_REJECT;
                        }

                        return node.nodeValue.trim()
                            ? NodeFilter.FILTER_ACCEPT
                            : NodeFilter.FILTER_REJECT;
                    }
                }
            );

            const textNodes = [];

            while (walker.nextNode()) {
                textNodes.push(walker.currentNode);
            }

            textNodes.forEach((node) => {
                node.nodeValue =
                    replaceIeungWithMieum(node.nodeValue);
            });

            // 이미지 설명과 입력 안내 문구도 변환
            root
                .querySelectorAll(
                    "[alt], [title], [aria-label], [placeholder]"
                )
                .forEach((element) => {
                    [
                        "alt",
                        "title",
                        "aria-label",
                        "placeholder"
                    ].forEach((attr) => {
                        if (element.hasAttribute(attr)) {
                            element.setAttribute(
                                attr,
                                replaceIeungWithMieum(
                                    element.getAttribute(attr)
                                )
                            );
                        }
                    });
                });
        }

        function convertPageText() {
            convertVisibleText(document.body);

            // 브라우저 탭 제목
            document.title =
                replaceIeungWithMieum(document.title);

            // 카카오톡 등 공유 미리보기 문구
            document
                .querySelectorAll(
                    'meta[property="og:title"], ' +
                    'meta[property="og:description"]'
                )
                .forEach((meta) => {
                    meta.content =
                        replaceIeungWithMieum(meta.content);
                });
        }

        convertPageText();

        // 알림창 등 나중에 추가되는 문구도 자동 변환
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.nodeType === Node.TEXT_NODE) {
                        const parentTag =
                            node.parentElement?.tagName;

                        if (
                            !["SCRIPT", "STYLE", "NOSCRIPT"]
                                .includes(parentTag)
                        ) {
                            node.nodeValue =
                                replaceIeungWithMieum(
                                    node.nodeValue
                                );
                        }
                    } else if (
                        node.nodeType === Node.ELEMENT_NODE
                    ) {
                        convertVisibleText(node);
                    }
                });
            });
        });

        observer.observe(document.body, {
            childList: true,
            subtree: true
        });
    })();
</script>
